name: DevSecOps CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security_checks:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout do Código
        uses: actions/checkout@v4

      # -- FASE 1: SECRET SCANNING --
      - name: 2. Gitleaks (Busca por credenciais vazadas)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Se o Gitleaks achar um token JWT ou senha de banco de dados, o pipeline falha aqui.

      # -- FASE 2: SAST (Análise Estática) --
      # Exemplo usando Semgrep, que suporta Java, Python, JavaScript, etc.
      - name: 3. Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/default"
        # O Semgrep lê o código buscando padrões vulneráveis, como concatenação direta de strings em queries do PostgreSQL ou MongoDB.

      # -- FASE 3: SCA (Análise de Dependências) --
      - name: 4. Trivy Vulnerability Scanner (SCA)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH'
        # O Trivy lê os arquivos de dependência (como o pom.xml ou requirements.txt) 
        # e bloqueia o build se bibliotecas com vulnerabilidades CRÍTICAS ou ALTAS forem encontradas.